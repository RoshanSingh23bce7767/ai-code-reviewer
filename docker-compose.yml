services:
  backend:
    container_name: code-review-backend
    build:
      context: ./server
      dockerfile: ../docker/server.Dockerfile
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      NODE_ENV: production
      MONGODB_URI: mongodb://mongodb:27017/ai_code_review
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET to a strong random value}
      REQUEST_BODY_LIMIT: ${REQUEST_BODY_LIMIT:-1mb}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5000}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-no-reply@localhost}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:5000}
      GEMINI_API_KEY: ${GEMINI_API_KEY:?Set GEMINI_API_KEY for AI reviews}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash-lite}
    depends_on:
      - mongodb
      - redis
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    networks:
      - app-network

  frontend:
    container_name: code-review-frontend
    build:
      context: ./client
      dockerfile: ../docker/client.Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000/api/v1}
        VITE_APP_NAME: ${VITE_APP_NAME:-AI Code Reviewer}
        VITE_AI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash-lite}
    ports:
      - "5173:80"
    depends_on:
      - backend
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    networks:
      - app-network

  mongodb:
    container_name: code-review-mongodb
    image: mongo:5.0-focal
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped
    networks:
      - app-network

  redis:
    container_name: code-review-redis
    image: redis:6.2-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mongo-data:
  redis-data:
